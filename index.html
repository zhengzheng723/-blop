<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>bløp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background:#f4f1ea;
  overflow:hidden;
  font-family:"Inter",sans-serif;
  cursor:default;
}

.stage{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

svg.main{
  width:min(95vh, 95vw);
  height:min(95vh, 95vw);
  display:block;
  overflow:visible;
}

.corner{
  position:fixed;
  font-family:"DM Mono",monospace;
  font-size:10px;
  color:#999;
  letter-spacing:0.2em;
  z-index:20;
}
.corner.tl{top:24px;left:24px;}
.corner.tr{top:24px;right:24px;}
.corner.br{bottom:24px;right:24px;font-style:italic;}

.creatures-layer{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:2;
}
.falling-creature{
  position:absolute;
  pointer-events:none;
  will-change:transform;
}

</style>
</head>
<body>

<div class="corner tl">bl&oslash;p &mdash; 2026</div>
<div class="corner tr">phone charms &amp; straps</div>



<div class="creatures-layer" id="creaturesLayer"></div>

<div class="stage">
  <svg class="main" viewBox="-380 -380 760 760" xmlns="http://www.w3.org/2000/svg">

    <defs>
      <!-- Concentric organic ring paths for text to follow -->
      <!-- Each path is a slightly bumpy circle, expanding outward -->
      <!-- arc paths going from left to right OVER the top -->
      <path id="ring1" d="M -180,0 A 180,180 0 0 1 180,0" fill="none"/>
      <path id="ring2" d="M -230,0 A 230,230 0 0 1 230,0" fill="none"/>
      <path id="ring3" d="M -285,0 A 285,285 0 0 1 285,0" fill="none"/>
      <path id="ring4" d="M -345,0 A 345,345 0 0 1 345,0" fill="none"/>

      <!-- full closed organic rings -->
      <path id="ringFull1" d="M 0,-180
        Q 125,-180 180,-75
        Q 200,45 125,140
        Q 35,185 -85,158
        Q -180,115 -180,0
        Q -175,-105 -95,-165
        Q -50,-185 0,-180 Z" fill="none"/>

      <path id="ringFull2" d="M 0,-230
        Q 160,-230 230,-95
        Q 255,65 160,180
        Q 50,235 -105,200
        Q -235,150 -235,5
        Q -230,-135 -125,-205
        Q -60,-235 0,-230 Z" fill="none"/>

      <path id="ringFull3" d="M 0,-285
        Q 200,-285 285,-115
        Q 320,75 200,235
        Q 70,300 -135,250
        Q -295,180 -295,10
        Q -290,-175 -155,-260
        Q -75,-290 0,-285 Z" fill="none"/>

      <path id="ringFull4" d="M 0,-345
        Q 240,-345 345,-130
        Q 385,90 240,285
        Q 85,365 -165,300
        Q -355,215 -355,15
        Q -350,-210 -190,-310
        Q -90,-350 0,-345 Z" fill="none"/>
    </defs>

    <!-- Visual outline rings -->
    <use href="#ringFull1" stroke="#666" stroke-width="0.5" fill="none"/>
    <use href="#ringFull2" stroke="#666" stroke-width="0.5" fill="none"/>
    <use href="#ringFull3" stroke="#666" stroke-width="0.5" fill="none"/>
    <use href="#ringFull4" stroke="#666" stroke-width="0.5" fill="none"/>

    <!-- Text from inner to outer -->
    <!-- ring 1 (innermost): phonetic -->
    <text font-family="DM Mono, monospace" font-weight="400" font-size="11" letter-spacing="2" fill="#666">
      <textPath href="#ring1" startOffset="50%" text-anchor="middle">/ bl &aelig; p /</textPath>
    </text>

    <!-- ring 2: brand logo -->
    <text font-family="Inter, sans-serif" font-weight="400" font-size="24" letter-spacing="22" fill="#111">
      <textPath href="#ring2" startOffset="50%" text-anchor="middle">b l &oslash; p</textPath>
    </text>

    <!-- ring 3: tagline -->
    <text font-family="DM Mono, monospace" font-weight="400" font-size="10.5" letter-spacing="3.5" fill="#444">
      <textPath href="#ring3" startOffset="50%" text-anchor="middle">unique &middot; weird &middot; yours</textPath>
    </text>

    <!-- ring 4: poetic line -->
    <text font-family="DM Mono, monospace" font-weight="300" font-size="9" letter-spacing="2.2" fill="#888" font-style="italic">
      <textPath href="#ring4" startOffset="50%" text-anchor="middle">unexpected &middot; harmless &middot; complete &middot; something arriving quietly</textPath>
    </text>

    <!-- Central little creature -->
    <g id="creatureCenter" transform="scale(1.5) translate(-80, -65)">

      <g id="bodyG">
        <circle cx="58" cy="8" r="12" fill="#111"/>
        <circle cx="72" cy="3" r="8" fill="#111"/>
        <circle cx="81" cy="7" r="14" fill="#111"/>
        <circle cx="95" cy="4" r="7" fill="#111"/>
        <circle cx="103" cy="10" r="11" fill="#111"/>
        <circle cx="47" cy="12" r="7" fill="#111"/>
        <circle cx="38" cy="17" r="10" fill="#111"/>
        <circle cx="113" cy="18" r="9" fill="#111"/>
        <circle cx="120" cy="28" r="12" fill="#111"/>
        <circle cx="126" cy="40" r="8" fill="#111"/>
        <circle cx="124" cy="52" r="13" fill="#111"/>
        <circle cx="119" cy="65" r="7" fill="#111"/>
        <circle cx="118" cy="75" r="11" fill="#111"/>
        <circle cx="113" cy="86" r="8" fill="#111"/>
        <circle cx="104" cy="95" r="12" fill="#111"/>
        <circle cx="91" cy="101" r="9" fill="#111"/>
        <circle cx="78" cy="104" r="13" fill="#111"/>
        <circle cx="64" cy="102" r="8" fill="#111"/>
        <circle cx="51" cy="97" r="11" fill="#111"/>
        <circle cx="40" cy="89" r="7" fill="#111"/>
        <circle cx="30" cy="78" r="13" fill="#111"/>
        <circle cx="24" cy="65" r="7" fill="#111"/>
        <circle cx="22" cy="52" r="12" fill="#111"/>
        <circle cx="26" cy="38" r="8" fill="#111"/>
        <circle cx="31" cy="27" r="11" fill="#111"/>
        <ellipse cx="76" cy="-4" rx="5" ry="10" fill="#111" transform="rotate(-15 76 -4)"/>
        <ellipse cx="130" cy="58" rx="10" ry="5" fill="#111" transform="rotate(10 130 58)"/>
        <ellipse cx="18" cy="55" rx="10" ry="4" fill="#111" transform="rotate(-8 18 55)"/>
        <ellipse cx="76" cy="112" rx="5" ry="9" fill="#111" transform="rotate(8 76 112)"/>
        <ellipse cx="76" cy="54" rx="54" ry="52" fill="#111"/>
      </g>

      <!-- eye whites -->
      <circle cx="56" cy="50" r="17" fill="white"/>
      <circle cx="97" cy="37" r="9" fill="white"/>
      <circle cx="93" cy="65" r="12" fill="white"/>

      <!-- pupils + highlights -->
      <circle id="pup1" cx="56" cy="50" r="11" fill="#111"/>
      <circle id="pup2" cx="97" cy="37" r="6"  fill="#111"/>
      <circle id="pup3" cx="93" cy="65" r="5"  fill="#111"/>
      <circle id="hi1"  cx="50" cy="44" r="3.5" fill="white"/>
      <circle id="hi2"  cx="93" cy="33" r="1.5" fill="white"/>
      <circle id="hi3"  cx="91" cy="63" r="1.5" fill="white"/>
    </g>

  </svg>
</div>

<script>
// Center creature self-rotation — rotate around creature body center
let centerRot = 0;
const centerCreature = document.getElementById('creatureCenter');
(function rotateCenterCreature(){
  centerRot += 0.2;
  // Creature body center in final SVG coords: (76-80)*1.5=-6, (54-65)*1.5=-16.5
  if(centerCreature) centerCreature.setAttribute('transform', 
    `rotate(${centerRot.toFixed(2)}, -6, -16.5) scale(1.5) translate(-80, -65)`);
  requestAnimationFrame(rotateCenterCreature);
})();

// Eye tracking — pupils follow the mouse
const pupilData = [
  { pid:'pup1', hid:'hi1', cx:56, cy:50, maxR:5, hox:-6, hoy:-6 },
  { pid:'pup2', hid:'hi2', cx:97, cy:37, maxR:2.5, hox:-4, hoy:-4 },
  { pid:'pup3', hid:'hi3', cx:93, cy:65, maxR:2, hox:-2, hoy:-2 },
];

document.addEventListener('mousemove', e => {
  const svg = document.querySelector('svg.main');
  const rect = svg.getBoundingClientRect();
  // creature is in SVG center (0,0 in viewBox), at scale 0.55
  // creature SVG span 0..160 mapped to scale 0.55, centered at (-80*0.55=-44, -65*0.55=-35.75)
  // creature visible center in viewBox ≈ (0, 0) (we did translate(-80,-65) inside scale 0.55, so 80*0.55=44 right, etc.)
  // Actually with transform="scale(0.55) translate(-80,-65)" the center of body (76,54) maps to:
  // (76-80)*0.55 = -2.2, (54-65)*0.55 = -6.05 — close to (0,0)

  // Convert mouse to SVG coords
  const vbW = 600, vbH = 600; // viewBox -300..300
  const sx = (e.clientX - rect.left) / rect.width * vbW - 300;
  const sy = (e.clientY - rect.top)  / rect.height * vbH - 300;

  pupilData.forEach(eye => {
    const pup = document.getElementById(eye.pid);
    const hi  = document.getElementById(eye.hid);
    if(!pup || !hi) return;

    // Eye center in viewBox coords (after scale 0.55 + translate(-80,-65))
    const eyeVbX = (eye.cx - 80) * 1.5;
    const eyeVbY = (eye.cy - 65) * 1.5;

    const dx = sx - eyeVbX;
    const dy = sy - eyeVbY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const move = Math.min(dist * 0.04, eye.maxR);
    const nx = dist > 0 ? (dx/dist)*move : 0;
    const ny = dist > 0 ? (dy/dist)*move : 0;

    // Pupil moves in creature's local coords
    pup.setAttribute('cx', (eye.cx + nx).toFixed(2));
    pup.setAttribute('cy', (eye.cy + ny).toFixed(2));
    hi.setAttribute('cx', (eye.cx + nx + eye.hox).toFixed(2));
    hi.setAttribute('cy', (eye.cy + ny + eye.hoy).toFixed(2));
  });
});
</script>

<script>
(function(){
  const layer = document.getElementById('creaturesLayer');
  const COUNT = 14;
  const creatures = [];

  let mouseX = window.innerWidth/2, mouseY = window.innerHeight/2;
  document.addEventListener('mousemove', e => { mouseX=e.clientX; mouseY=e.clientY; });

  // colors: most are black; one vermillion (#C8102E), one navy (#1B2A4E)
  const colors = ['#111'];
  const VERMILLION = '#C8102E';
  const NAVY = '#1A6FDB';

  function makeFallingSVG(size, color){
    return `<svg viewBox="0 0 160 130" width="${size}" height="${Math.round(size*0.82)}"
      style="overflow:visible;display:block;" xmlns="http://www.w3.org/2000/svg">

      <g class="body-g">
        <circle cx="58" cy="8" r="12" fill="${color}"/>
        <circle cx="72" cy="3" r="8" fill="${color}"/>
        <circle cx="81" cy="7" r="14" fill="${color}"/>
        <circle cx="95" cy="4" r="7" fill="${color}"/>
        <circle cx="103" cy="10" r="11" fill="${color}"/>
        <circle cx="47" cy="12" r="7" fill="${color}"/>
        <circle cx="38" cy="17" r="10" fill="${color}"/>
        <circle cx="113" cy="18" r="9" fill="${color}"/>
        <circle cx="120" cy="28" r="12" fill="${color}"/>
        <circle cx="126" cy="40" r="8" fill="${color}"/>
        <circle cx="124" cy="52" r="13" fill="${color}"/>
        <circle cx="119" cy="65" r="7" fill="${color}"/>
        <circle cx="118" cy="75" r="11" fill="${color}"/>
        <circle cx="113" cy="86" r="8" fill="${color}"/>
        <circle cx="104" cy="95" r="12" fill="${color}"/>
        <circle cx="91" cy="101" r="9" fill="${color}"/>
        <circle cx="78" cy="104" r="13" fill="${color}"/>
        <circle cx="64" cy="102" r="8" fill="${color}"/>
        <circle cx="51" cy="97" r="11" fill="${color}"/>
        <circle cx="40" cy="89" r="7" fill="${color}"/>
        <circle cx="30" cy="78" r="13" fill="${color}"/>
        <circle cx="24" cy="65" r="7" fill="${color}"/>
        <circle cx="22" cy="52" r="12" fill="${color}"/>
        <circle cx="26" cy="38" r="8" fill="${color}"/>
        <circle cx="31" cy="27" r="11" fill="${color}"/>
        <circle cx="68" cy="2" r="5" fill="${color}"/>
        <circle cx="88" cy="1" r="6" fill="${color}"/>
        <circle cx="117" cy="22" r="6" fill="${color}"/>
        <circle cx="128" cy="47" r="6" fill="${color}"/>
        <circle cx="121" cy="70" r="5" fill="${color}"/>
        <circle cx="108" cy="91" r="6" fill="${color}"/>
        <circle cx="84" cy="106" r="6" fill="${color}"/>
        <circle cx="58" cy="105" r="5" fill="${color}"/>
        <circle cx="35" cy="93" r="6" fill="${color}"/>
        <circle cx="20" cy="70" r="6" fill="${color}"/>
        <circle cx="19" cy="47" r="5" fill="${color}"/>
        <circle cx="28" cy="22" r="6" fill="${color}"/>
        <ellipse cx="76" cy="-4" rx="5" ry="10" fill="${color}" transform="rotate(-15 76 -4)"/>
        <ellipse cx="130" cy="58" rx="10" ry="5" fill="${color}" transform="rotate(10 130 58)"/>
        <ellipse cx="18" cy="55" rx="10" ry="4" fill="${color}" transform="rotate(-8 18 55)"/>
        <ellipse cx="76" cy="112" rx="5" ry="9" fill="${color}" transform="rotate(8 76 112)"/>
        <ellipse cx="76" cy="54" rx="54" ry="52" fill="${color}"/>
      </g>

      <g class="eye-whites-g">
        <circle cx="56" cy="50" r="17" fill="white"/>
        <circle cx="97" cy="37" r="9" fill="white"/>
        <circle cx="93" cy="65" r="12" fill="white"/>
      </g>

      <g class="pupils-g">
        <circle class="pup" data-eye="0" cx="56" cy="50" r="11" fill="${color}"/>
        <circle class="pup" data-eye="1" cx="97" cy="37" r="6"  fill="${color}"/>
        <circle class="pup" data-eye="2" cx="93" cy="65" r="5"  fill="${color}"/>
        <circle class="hi"  data-eye="0" cx="50" cy="44" r="3.5" fill="white"/>
        <circle class="hi"  data-eye="1" cx="93" cy="33" r="1.5" fill="white"/>
        <circle class="hi"  data-eye="2" cx="91" cy="63" r="1.5" fill="white"/>
      </g>
    </svg>`;
  }

  const eyeData = [
    { cx:56, cy:50, maxR:5, hox:-6, hoy:-6 },
    { cx:97, cy:37, maxR:2.5, hox:-4, hoy:-4 },
    { cx:93, cy:65, maxR:2, hox:-2, hoy:-2 }
  ];

  function spawnFalling(initial){
    const size = 28 + Math.random() * 65;

    // Pick color: 0 = vermillion (only one), 1 = navy (only one), else black
    let color = '#111';
    const hasVermillion = creatures.some(c => c.color === VERMILLION);
    const hasNavy = creatures.some(c => c.color === NAVY);
    if(!hasVermillion && Math.random() < 0.06) color = VERMILLION;
    else if(!hasNavy && Math.random() < 0.06) color = NAVY;

    const el = document.createElement('div');
    el.className = 'falling-creature';
    el.innerHTML = makeFallingSVG(size, color);

    const x = Math.random() * window.innerWidth;
    const y = initial
      ? Math.random() * window.innerHeight
      : -size - Math.random() * 200;

    const vy = 0.4 + Math.random() * 0.9;
    const vx = (Math.random() - 0.5) * 0.4;
    const rotation = Math.random() * 360;
    const rotSpeed = (Math.random() - 0.5) * 1.5;
    const opacity = color === '#111' ? (0.45 + Math.random()*0.45) : 0.95;

    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.opacity = opacity.toFixed(2);
    el.style.zIndex = color === '#111' ? Math.floor(opacity*5) : 8;
    layer.appendChild(el);

    const svgEl = el.querySelector('svg');
    const bodyG = el.querySelector('.body-g');
    const eyeWhitesG = el.querySelector('.eye-whites-g');
    const pupils = el.querySelectorAll('.pup');
    const hilights = el.querySelectorAll('.hi');

    creatures.push({
      el, svgEl, bodyG, eyeWhitesG, pupils, hilights,
      x, y, vx, vy, rotation, rotSpeed, size, color
    });
  }

  for(let i = 0; i < COUNT; i++) spawnFalling(true);

  function tick(){
    const H = window.innerHeight;

    for(let i = creatures.length - 1; i >= 0; i--){
      const c = creatures[i];
      c.y += c.vy;
      c.x += c.vx;
      c.rotation += c.rotSpeed;

      c.el.style.left = c.x + 'px';
      c.el.style.top  = c.y + 'px';

      const rot = `rotate(${c.rotation} 76 54)`;
      c.bodyG.setAttribute('transform', rot);
      c.eyeWhitesG.setAttribute('transform', rot);

      // Pupils track mouse despite body rotation
      const rect = c.svgEl.getBoundingClientRect();
      if(rect.width === 0) { requestAnimationFrame(tick); return; }
      const sX = 160 / rect.width;
      const sY = 130 / rect.height;
      const angleRad = c.rotation * Math.PI / 180;
      const cosA = Math.cos(angleRad);
      const sinA = Math.sin(angleRad);

      eyeData.forEach((eye, idx) => {
        const ox = eye.cx - 76;
        const oy = eye.cy - 54;
        const rotEyeX = ox * cosA - oy * sinA + 76;
        const rotEyeY = ox * sinA + oy * cosA + 54;

        const screenX = rect.left + rotEyeX / sX;
        const screenY = rect.top  + rotEyeY / sY;

        const dx = mouseX - screenX;
        const dy = mouseY - screenY;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const move = Math.min(dist*0.15, eye.maxR);
        const nx = dist > 0 ? (dx/dist)*move : 0;
        const ny = dist > 0 ? (dy/dist)*move : 0;

        const newCx = rotEyeX + nx * sX;
        const newCy = rotEyeY + ny * sY;

        c.pupils[idx].setAttribute('cx', newCx.toFixed(1));
        c.pupils[idx].setAttribute('cy', newCy.toFixed(1));
        c.hilights[idx].setAttribute('cx', (newCx + eye.hox).toFixed(1));
        c.hilights[idx].setAttribute('cy', (newCy + eye.hoy).toFixed(1));
      });

      if(c.y > H + c.size + 50){
        c.el.remove();
        creatures.splice(i, 1);
        spawnFalling(false);
      }
    }

    // Collision detection between creatures
    for(let i = 0; i < creatures.length; i++){
      for(let j = i+1; j < creatures.length; j++){
        const a = creatures[i];
        const b = creatures[j];
        const rA = a.size * 0.35;
        const rB = b.size * 0.35;
        const minDist = rA + rB;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < minDist && dist > 0){
          // Elastic bounce — exchange velocity components along collision axis
          const nx = dx/dist;
          const ny = dy/dist;
          const relVx = a.vx - b.vx;
          const relVy = a.vy - b.vy;
          const dot = relVx*nx + relVy*ny;
          if(dot > 0){
            const impulse = dot * 1.4;
            a.vx -= impulse * nx;
            a.vy -= impulse * ny;
            b.vx += impulse * nx;
            b.vy += impulse * ny;
            // Cap velocities after bounce
            const capA = Math.sqrt(a.vx*a.vx+a.vy*a.vy);
            const capB = Math.sqrt(b.vx*b.vx+b.vy*b.vy);
            if(capA > 3){ a.vx=a.vx/capA*3; a.vy=a.vy/capA*3; }
            if(capB > 3){ b.vx=b.vx/capB*3; b.vy=b.vy/capB*3; }
            // Separate overlapping creatures
            const overlap = (minDist - dist) / 2;
            a.x -= overlap * nx;
            a.y -= overlap * ny;
            b.x += overlap * nx;
            b.y += overlap * ny;
            // Spin boost on collision
            a.rotSpeed += (Math.random()-0.5) * 3;
            b.rotSpeed += (Math.random()-0.5) * 3;
          }
        }
      }
    }

    // Center creature collision with falling creatures
    const centerSvg = document.querySelector('svg.main');
    if(centerSvg){
      const cRect = centerSvg.getBoundingClientRect();
      // Center creature screen position (SVG center = middle of screen)
      const ccx = cRect.left + cRect.width/2;
      const ccy = cRect.top  + cRect.height/2;
      // Approximate radius of center creature in screen px
      const centerR = Math.min(cRect.width, cRect.height) * 0.22;

      for(let i = 0; i < creatures.length; i++){
        const c = creatures[i];
        const fcx = c.x + c.size/2;
        const fcy = c.y + c.size*0.41;
        const fR  = c.size * 0.35;
        const minDist = centerR + fR;
        const dx = fcx - ccx;
        const dy = fcy - ccy;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < minDist && dist > 0){
          const nx = dx/dist;
          const ny = dy/dist;
          // Falling creature bounces off center (center is immovable)
          const dot = c.vx*nx + c.vy*ny;
          if(dot < 0){
            c.vx -= 2 * dot * nx;
            c.vy -= 2 * dot * ny;
            // Cap
            const spd = Math.sqrt(c.vx*c.vx+c.vy*c.vy);
            if(spd > 3.5){ c.vx=c.vx/spd*3.5; c.vy=c.vy/spd*3.5; }
            // Spin boost
            c.rotSpeed += (Math.random()-0.5) * 4;
            // Separate
            const overlap = minDist - dist + 2;
            c.x += overlap * nx;
            c.y += overlap * ny;
          }
        }
      }
    }

    requestAnimationFrame(tick);
  }
  tick();

  setInterval(() => {
    if(creatures.length < COUNT + 4) spawnFalling(false);
  }, 800);
})();
</script>

</body>
</html>
