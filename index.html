    <circle id="ch1" cx="50" cy="44" r="3.5" fill="white"/>
    <circle id="ch2" cx="93" cy="33" r="1.5" fill="white"/>
    <circle id="ch3" cx="91" cy="63" r="1.5" fill="white"/>
  </g>
</g>

</svg>
</div>

<script>
// ── CREATURE SVG ──
function makeCreatureSVG(size, color){
  return `<svg viewBox="0 0 160 130" width="${size}" height="${Math.round(size*.82)}"
    style="overflow:visible;display:block;" xmlns="http://www.w3.org/2000/svg">
    <g class="bg">
      <circle cx="58" cy="8" r="12" fill="${color}"/>
      <circle cx="81" cy="7" r="14" fill="${color}"/>
      <circle cx="103" cy="10" r="11" fill="${color}"/>
      <circle cx="38" cy="17" r="10" fill="${color}"/>
      <circle cx="113" cy="18" r="9" fill="${color}"/>
      <circle cx="120" cy="28" r="12" fill="${color}"/>
      <circle cx="124" cy="52" r="13" fill="${color}"/>
      <circle cx="118" cy="75" r="11" fill="${color}"/>
      <circle cx="104" cy="95" r="12" fill="${color}"/>
      <circle cx="78" cy="104" r="13" fill="${color}"/>
      <circle cx="51" cy="97" r="11" fill="${color}"/>
      <circle cx="30" cy="78" r="13" fill="${color}"/>
      <circle cx="22" cy="52" r="12" fill="${color}"/>
      <circle cx="31" cy="27" r="11" fill="${color}"/>
      <ellipse cx="76" cy="-4" rx="5" ry="10" fill="${color}" transform="rotate(-15 76 -4)"/>
      <ellipse cx="130" cy="58" rx="10" ry="5" fill="${color}" transform="rotate(10 130 58)"/>
      <ellipse cx="18" cy="55" rx="10" ry="4" fill="${color}" transform="rotate(-8 18 55)"/>
      <ellipse cx="76" cy="112" rx="5" ry="9" fill="${color}" transform="rotate(8 76 112)"/>
      <ellipse cx="76" cy="54" rx="54" ry="52" fill="${color}"/>
    </g>
    <g class="ew">
      <circle cx="56" cy="50" r="17" fill="white"/>
      <circle cx="97" cy="37" r="9" fill="white"/>
      <circle cx="93" cy="65" r="12" fill="white"/>
    </g>
    <g class="pg">
      <circle class="pp" data-i="0" cx="56" cy="50" r="11" fill="${color}"/>
      <circle class="pp" data-i="1" cx="97" cy="37" r="6" fill="${color}"/>
      <circle class="pp" data-i="2" cx="93" cy="65" r="5" fill="${color}"/>
      <circle class="ph" data-i="0" cx="50" cy="44" r="3.5" fill="white"/>
      <circle class="ph" data-i="1" cx="93" cy="33" r="1.5" fill="white"/>
      <circle class="ph" data-i="2" cx="91" cy="63" r="1.5" fill="white"/>
    </g>
  </svg>`;
}

// ── MOUSE ──
let MX = window.innerWidth/2, MY = window.innerHeight/2;
document.addEventListener('mousemove', e => { MX=e.clientX; MY=e.clientY; });

// ── CENTER CREATURE ROTATION ──
let CR = 0; // current rotation degrees
const rotG = document.getElementById('rotG');

// eye centers in local coords (inside scale 1.5 translate -80,-65)
const C_EYES = [
  {cx:56,cy:50,maxR:5,hox:-6,hoy:-6},
  {cx:97,cy:37,maxR:2.5,hox:-4,hoy:-4},
  {cx:93,cy:65,maxR:2,hox:-2,hoy:-2}
];
const cpEls = [
  document.getElementById('cp1'),
  document.getElementById('cp2'),
  document.getElementById('cp3')
];
const chEls = [
  document.getElementById('ch1'),
  document.getElementById('ch2'),
  document.getElementById('ch3')
];

function animCenter(){
  CR += 0.2;
  // rotate around SVG origin (0,0) which is the center of the screen
  rotG.setAttribute('transform', `rotate(${CR})`);

  // Eye tracking: convert mouse to SVG space, then to rotated creature space
  const svg = document.getElementById('mainSvg');
  const r = svg.getBoundingClientRect();
  const vbSize = 760;
  // mouse in SVG coords
  const sx = (MX - r.left) / r.width  * vbSize - 380;
  const sy = (MY - r.top)  / r.height * vbSize - 380;
  // counter-rotate into creature local space
  const rad = -CR * Math.PI / 180;
  const lx = sx * Math.cos(rad) - sy * Math.sin(rad);
  const ly = sx * Math.sin(rad) + sy * Math.cos(rad);
  // creature local space is scale(1.5) translate(-80,-65)
  // so eye centers are at (eye.cx - 80)*1.5, (eye.cy-65)*1.5 in rotated SVG
  // but pupil cx/cy are in creature's own coords (pre-scale)

  C_EYES.forEach((eye, i) => {
    // eye center in rotated SVG coords
    const ex = (eye.cx - 80) * 1.5;
    const ey = (eye.cy - 65) * 1.5;
    const dx = lx - ex, dy = ly - ey;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const move = Math.min(dist*0.04, eye.maxR);
    const nx = dist>0?(dx/dist)*move:0;
    const ny = dist>0?(dy/dist)*move:0;
    // back to creature local coords: divide by scale 1.5
    const pcx = eye.cx + nx/1.5;
    const pcy = eye.cy + ny/1.5;
    cpEls[i].setAttribute('cx', pcx.toFixed(2));
    cpEls[i].setAttribute('cy', pcy.toFixed(2));
    chEls[i].setAttribute('cx', (pcx+eye.hox).toFixed(2));
    chEls[i].setAttribute('cy', (pcy+eye.hoy).toFixed(2));
  });

  requestAnimationFrame(animCenter);
}
animCenter();

// ── FALLING CREATURES ──
const layer = document.getElementById('fallingLayer');
const COUNT = 16;
const creatures = [];
const VERMILLION = '#C8102E';
const NAVY = '#1A6FDB';

const F_EYES = [
  {cx:56,cy:50,maxR:5,hox:-6,hoy:-6},
  {cx:97,cy:37,maxR:2.5,hox:-4,hoy:-4},
  {cx:93,cy:65,maxR:2,hox:-2,hoy:-2}
];

function spawnFalling(initial){
  const size = 28 + Math.random()*65;
  let color = '#111';
  const hasV = creatures.some(c=>c.color===VERMILLION);
  const hasN = creatures.some(c=>c.color===NAVY);
  if(!hasV && Math.random()<0.07) color=VERMILLION;
  else if(!hasN && Math.random()<0.07) color=NAVY;

  const el = document.createElement('div');
  el.className = 'falling-creature';
  el.innerHTML = makeCreatureSVG(size, color);
  el.style.cssText = 'position:absolute;pointer-events:none;';

  const x = Math.random()*window.innerWidth;
  const y = initial ? Math.random()*window.innerHeight : -size-Math.random()*200;
  const vy = 0.4+Math.random()*0.9;
  const vx = (Math.random()-.5)*.4;
  const rot = Math.random()*360;
  const rs  = (Math.random()-.5)*1.5;
  const op  = color==='#111' ? 0.45+Math.random()*.45 : 0.95;

  el.style.left = x+'px';
  el.style.top  = y+'px';
  el.style.opacity = op;
  layer.appendChild(el);

  const svgEl    = el.querySelector('svg');
  const bodyG    = el.querySelector('.bg');
  const eyeWhite = el.querySelector('.ew');
  const pupils   = el.querySelectorAll('.pp');
  const hilights = el.querySelectorAll('.ph');

  creatures.push({el,svgEl,bodyG,eyeWhite,pupils,hilights,x,y,vx,vy,rot,rs,size,color});
}

for(let i=0;i<COUNT;i++) spawnFalling(true);

function tick(){
  const H=window.innerHeight, W=window.innerWidth;

  // ── update each falling creature ──
  for(let i=creatures.length-1;i>=0;i--){
    const c=creatures[i];
    c.y+=c.vy; c.x+=c.vx; c.rot+=c.rs;
    c.el.style.left=c.x+'px';
    c.el.style.top =c.y+'px';

    const rotAttr=`rotate(${c.rot} 76 54)`;
    c.bodyG.setAttribute('transform',rotAttr);
    c.eyeWhite.setAttribute('transform',rotAttr);

    // pupil tracking — account for body rotation
    const rect=c.svgEl.getBoundingClientRect();
    if(rect.width>0){
      const sX=160/rect.width, sY=130/rect.height;
      const ang=c.rot*Math.PI/180;
      const cosA=Math.cos(ang), sinA=Math.sin(ang);
      F_EYES.forEach((eye,idx)=>{
        const ox=eye.cx-76, oy=eye.cy-54;
        const rex=ox*cosA-oy*sinA+76;
        const rey=ox*sinA+oy*cosA+54;
        const scx=rect.left+rex/sX;
        const scy=rect.top +rey/sY;
        const dx=MX-scx, dy=MY-scy;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const move=Math.min(dist*.15,eye.maxR);
        const nx=dist>0?(dx/dist)*move:0;
        const ny=dist>0?(dy/dist)*move:0;
        const ncx=rex+nx*sX;
        const ncy=rey+ny*sY;
        c.pupils[idx].setAttribute('cx',ncx.toFixed(1));
        c.pupils[idx].setAttribute('cy',ncy.toFixed(1));
        c.hilights[idx].setAttribute('cx',(ncx+eye.hox).toFixed(1));
        c.hilights[idx].setAttribute('cy',(ncy+eye.hoy).toFixed(1));
      });
    }

    if(c.y>H+c.size+50){
      c.el.remove(); creatures.splice(i,1); spawnFalling(false);
    }
  }

  // ── creature-creature collision ──
  for(let i=0;i<creatures.length;i++){
    for(let j=i+1;j<creatures.length;j++){
      const a=creatures[i], b=creatures[j];
      const rA=a.size*.35, rB=b.size*.35;
      const dx=b.x-a.x, dy=b.y-a.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<rA+rB&&dist>0){
        const nx=dx/dist, ny=dy/dist;
        const dot=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny;
        if(dot>0){
          const imp=dot*1.4;
          a.vx-=imp*nx; a.vy-=imp*ny;
          b.vx+=imp*nx; b.vy+=imp*ny;
          [a,b].forEach(c=>{
            const sp=Math.sqrt(c.vx*c.vx+c.vy*c.vy);
            if(sp>3){c.vx=c.vx/sp*3;c.vy=c.vy/sp*3;}
          });
          const ov=(rA+rB-dist)/2;
          a.x-=ov*nx; a.y-=ov*ny; b.x+=ov*nx; b.y+=ov*ny;
          a.rs+=(Math.random()-.5)*3; b.rs+=(Math.random()-.5)*3;
        }
      }
    }
  }

  // ── collision with center creature ──
  const mainSvg=document.getElementById('mainSvg');
  const mr=mainSvg.getBoundingClientRect();
  const ccx=mr.left+mr.width/2;
  const ccy=mr.top +mr.height/2;
  const centerR=Math.min(mr.width,mr.height)*0.22;
  for(let i=0;i<creatures.length;i++){
    const c=creatures[i];
    const fcx=c.x+c.size/2, fcy=c.y+c.size*.41;
    const fR=c.size*.35;
    const dx=fcx-ccx, dy=fcy-ccy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<centerR+fR&&dist>0){
      const nx=dx/dist, ny=dy/dist;
      const dot=c.vx*nx+c.vy*ny;
      if(dot<0){
        c.vx-=2*dot*nx; c.vy-=2*dot*ny;
        const sp=Math.sqrt(c.vx*c.vx+c.vy*c.vy);
        if(sp>3.5){c.vx=c.vx/sp*3.5;c.vy=c.vy/sp*3.5;}
        c.rs+=(Math.random()-.5)*4;
        const ov=centerR+fR-dist+2;
        c.x+=ov*nx; c.y+=ov*ny;
      }
    }
  }

  requestAnimationFrame(tick);
}
tick();

setInterval(()=>{ if(creatures.length<COUNT+4) spawnFalling(false); }, 800);
</script>
</body>
</html>
